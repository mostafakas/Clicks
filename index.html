<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechZone | متجر الإلكترونيات الأول</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="logo">
            <h2>Tech<span>Zone</span></h2>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="ابحث عن لابتوب، موبايل، أو أي جهاز ذكي...">
            <button onclick="searchProducts()"><i class="fas fa-search"></i></button>
        </div>
        <div class="user-actions">
            <a href="#"><i class="fas fa-user"></i> دخول</a>
            <a href="#"><i class="fas fa-heart"></i> المفضلة</a>
            <a href="#" class="cart"><i class="fas fa-shopping-cart"></i> السلة <span class="badge" id="cartBadge">0</span></a>
        </div>
    </header>

    <nav class="categories">
        <ul>
            <li><a href="#"><i class="fas fa-laptop"></i> لابتوبات</a></li>
            <li><a href="#"><i class="fas fa-desktop"></i> كمبيوترات</a></li>
            <li><a href="#"><i class="fas fa-mobile-alt"></i> موبايلات</a></li>
            <li><a href="#"><i class="fas fa-headphones"></i> إكسسوارات</a></li>
            <li><a href="#"><i class="fas fa-gamepad"></i> Gaming Zone</a></li>
            <li><a href="#"><i class="fas fa-tools"></i> صيانة وخدمات</a></li>
        </ul>
    </nav>

    <section class="hero-banner">
        <div class="hero-content">
            <h1>🔥 عروض اللابتوبات تصل إلى 25%</h1>
            <p>اشتري الآن بالتقسيط المريح وبدون فوائد، وشحن مجاني للطلبات فوق 5000 جنيه!</p>
            <button class="btn-primary">تسوق الآن</button>
        </div>
    </section>

    <section class="products-section">
        <h3 class="section-title">أفضل العروض</h3>
        <div class="products-grid" id="products-container">
            <p style="text-align: center; width: 100%;">جاري تحميل المنتجات...</p>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD07kWys5dp3f6FJeYblxMcAfQzY94MTtE",
            authDomain: "clicks-f7ce3.firebaseapp.com",
            projectId: "clicks-f7ce3",
            storageBucket: "clicks-f7ce3.firebasestorage.app",
            messagingSenderId: "628318172493",
            appId: "1:628318172493:web:e5437bde78399b6fbaf304",
            measurementId: "G-L7Q6Q16ZH4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // متغير لحفظ عدد المنتجات في السلة
        let cartCount = 0;

        // دالة عرض المنتجات
        async function displayProducts() {
            const container = document.getElementById('products-container');
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                container.innerHTML = ""; // مسح رسالة التحميل

                if (querySnapshot.empty) {
                    container.innerHTML = "<p>لا توجد منتجات حالياً.</p>";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const product = doc.data();
                    container.innerHTML += `
                        <div class="product-card">
                            <img src="${product.image || 'https://via.placeholder.com/200'}" alt="${product.name}">
                            <h4>${product.name}</h4>
                            <div class="price">
                                <span class="new-price">${product.price} جنيه</span>
                            </div>
                            <button class="add-to-cart" data-id="${doc.id}">
                                <i class="fas fa-cart-plus"></i> أضف للسلة
                            </button>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("خطأ في جلب المنتجات: ", error);
                container.innerHTML = "<p>حدث خطأ أثناء تحميل المنتجات.</p>";
            }
        }

        // تشغيل دالة العرض
        displayProducts();

        // برمجة زر "أضف للسلة" ليعمل أوتوماتيكياً مع المنتجات الجديدة
        document.getElementById('products-container').addEventListener('click', function(e) {
            // التأكد أن الضغطة كانت على زر إضافة للسلة
            if (e.target.classList.contains('add-to-cart') || e.target.closest('.add-to-cart')) {
                cartCount++;
                document.getElementById('cartBadge').innerText = cartCount;
                
                // تغيير شكل الزر لحظياً لتأكيد الإضافة
                const btn = e.target.closest('.add-to-cart') || e.target;
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> تمت الإضافة';
                btn.style.backgroundColor = '#28a745';
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.backgroundColor = ''; // يرجع للونه الأصلي في CSS
                }, 1500);
            }
        });
    </script>
</body>
</html>
