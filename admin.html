<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f6f9; display: flex; }
        .sidebar { width: 250px; background: #111; color: white; min-height: 100vh; padding: 20px; }
        .sidebar h2 { color: #007bff; margin-bottom: 30px; text-align: center; }
        .sidebar a { color: #ccc; text-decoration: none; display: block; padding: 15px; margin-bottom: 5px; border-radius: 5px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: #007bff; color: white; }
        .sidebar a i { margin-left: 10px; width: 20px; }
        .main-content { flex: 1; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 800px; }
        .form-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .form-group { flex: 1; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        input:focus, select:focus { border-color: #007bff; }
        .btn-add { background-color: #007bff; color: white; border: none; padding: 15px; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; border-radius: 5px; margin-top: 10px; }
        .btn-add:hover { background-color: #0056b3; }
        .status-msg { margin-bottom: 20px; padding: 15px; border-radius: 5px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Admin<span>Panel</span></h2>
        <a href="#" class="active"><i class="fas fa-plus-circle"></i> إضافة منتج</a>
        <a href="#"><i class="fas fa-box"></i> إدارة المنتجات</a>
        <a href="#"><i class="fas fa-shopping-cart"></i> الطلبات</a>
        <a href="index.html" style="margin-top: 50px; background: #333;"><i class="fas fa-store"></i> عرض المتجر</a>
    </div>

    <div class="main-content">
        <div class="card">
            <h2>إضافة منتج جديد للمتجر</h2>
            <br>
            <div id="status" class="status-msg"></div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label>اسم المنتج</label>
                <input type="text" id="prodName" placeholder="مثلاً: HP Victus 15 Gaming Laptop">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>السعر الحالي (بعد الخصم)</label>
                    <input type="number" id="prodPrice" placeholder="35000">
                </div>
                <div class="form-group">
                    <label>السعر القديم (قبل الخصم) - اختياري</label>
                    <input type="number" id="prodOldPrice" placeholder="40000">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>القسم الرئيسي</label>
                    <select id="prodCategory">
                        <option value="Laptops">لابتوبات</option>
                        <option value="PC">كمبيوتر وتجميعات</option>
                        <option value="Mobiles">موبايلات</option>
                        <option value="Accessories">إكسسوارات</option>
                        <option value="Gaming">Gaming Zone</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>الماركة (Brand)</label>
                    <input type="text" id="prodBrand" placeholder="مثال: Apple, HP, Samsung">
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label>رابط صورة المنتج (URL)</label>
                <input type="text" id="prodImage" placeholder="https://...">
            </div>

            <button class="btn-add" id="saveBtn"><i class="fas fa-rocket"></i> نشر المنتج</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD07kWys5dp3f6FJeYblxMcAfQzY94MTtE",
            authDomain: "clicks-f7ce3.firebaseapp.com",
            projectId: "clicks-f7ce3",
            storageBucket: "clicks-f7ce3.firebasestorage.app",
            messagingSenderId: "628318172493",
            appId: "1:628318172493:web:e5437bde78399b6fbaf304",
            measurementId: "G-L7Q6Q16ZH4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const saveBtn = document.getElementById('saveBtn');
        const status = document.getElementById('status');

        saveBtn.addEventListener('click', async () => {
            const name = document.getElementById('prodName').value;
            const price = document.getElementById('prodPrice').value;
            const oldPrice = document.getElementById('prodOldPrice').value;
            const category = document.getElementById('prodCategory').value;
            const brand = document.getElementById('prodBrand').value;
            const image = document.getElementById('prodImage').value;

            if(!name || !price || !image || !brand) {
                alert("برجاء ملء البيانات الأساسية (الاسم، السعر، الصورة، الماركة)");
                return;
            }

            saveBtn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> جاري الحفظ...";
            saveBtn.disabled = true;

            try {
                await addDoc(collection(db, "products"), {
                    name: name,
                    price: Number(price),
                    oldPrice: oldPrice ? Number(oldPrice) : null,
                    category: category,
                    brand: brand,
                    image: image,
                    createdAt: new Date()
                });

                status.style.display = "block";
                status.style.backgroundColor = "#d4edda";
                status.style.color = "#155724";
                status.innerText = "تمت إضافة المنتج بنجاح! 🚀";
                
                // مسح الخانات
                document.querySelectorAll('input').forEach(input => input.value = '');
                
            } catch (e) {
                console.error("Error: ", e);
                status.style.display = "block";
                status.style.backgroundColor = "#f8d7da";
                status.style.color = "#721c24";
                status.innerText = "حدث خطأ أثناء الحفظ.";
            } finally {
                saveBtn.innerHTML = "<i class='fas fa-rocket'></i> نشر المنتج";
                saveBtn.disabled = false;
                setTimeout(() => status.style.display = "none", 4000);
            }
        });
    </script>
</body>
</html>
